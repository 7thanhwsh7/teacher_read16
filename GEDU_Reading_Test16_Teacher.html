<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G.EDU — Teacher Reading Correction Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --cream:        #fdfcfb;
  --cream-deep:   #f5f2ed;
  --cream-border: #e8e2d9;
  --ink:          #1a1714;
  --ink-soft:     #4a4540;
  --ink-muted:    #8a8178;
  --gold:         #D4AF37;
  --gold-light:   #F0D060;
  --gold-pale:    #fdf6dc;
  --gold-border:  #e8c84a;
  --navy:         #1b2a4a;
  --navy-mid:     #253a63;
  --highlight:    #fff176;
  --highlight-bg: #fffde7;
  --success:      #2e7d32;
  --success-bg:   #f1f8e9;
  --evidence-bg:  #e8f4fd;
  --evidence-border: #90caf9;
  --shadow-sm:    0 1px 3px rgba(26,23,20,0.08);
  --shadow-md:    0 4px 16px rgba(26,23,20,0.10);
  --shadow-lg:    0 8px 32px rgba(26,23,20,0.13);
  --radius-sm:    6px;
  --radius-md:    12px;
  --radius-lg:    18px;
  --sidebar-w:    72px;
  --font-body:    'Be Vietnam Pro', sans-serif;
  --font-display: 'Playfair Display', Georgia, serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.6;
  overflow: hidden;
}

/* ═══════════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════════ */
#app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 240px;
  min-width: 240px;
  background: var(--navy);
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
  box-shadow: 2px 0 12px rgba(0,0,0,0.18);
  z-index: 10;
  flex-shrink: 0;
}

.sidebar-logo {
  padding: 22px 20px 16px;
  border-bottom: 1px solid rgba(212,175,55,0.25);
  flex-shrink: 0;
}

.logo-mark {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.04em;
}

.logo-sub {
  font-size: 9px;
  font-weight: 600;
  color: rgba(212,175,55,0.6);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 2px;
}

.logo-test-name {
  margin-top: 10px;
  padding: 6px 10px;
  background: rgba(212,175,55,0.12);
  border: 1px solid rgba(212,175,55,0.35);
  border-radius: 6px;
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  font-style: italic;
  color: var(--gold-light);
  letter-spacing: 0.02em;
  text-align: center;
}

.sidebar-section {
  padding: 14px 16px 10px;
  flex-shrink: 0;
}

.sidebar-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-bottom: 8px;
}

/* Passage selector */
.passage-tabs {
  display: flex;
  gap: 4px;
  padding: 12px 16px 0;
  flex-shrink: 0;
}

.passage-tab {
  flex: 1;
  padding: 7px 0;
  border: 1px solid rgba(212,175,55,0.3);
  background: transparent;
  color: rgba(255,255,255,0.55);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.03em;
}

.passage-tab:hover {
  background: rgba(212,175,55,0.12);
  color: var(--gold-light);
  border-color: rgba(212,175,55,0.5);
}

.passage-tab.active {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--navy);
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(212,175,55,0.35);
}

/* Question map */
.q-map-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 10px 16px 12px;
  scrollbar-width: thin;
  scrollbar-color: rgba(212,175,55,0.2) transparent;
}

.q-map-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
}

.q-chip {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
  border-radius: 5px;
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
}

.q-chip:hover {
  background: rgba(212,175,55,0.15);
  color: var(--gold-light);
  border-color: rgba(212,175,55,0.3);
}

.q-chip.answered {
  background: rgba(212,175,55,0.18);
  color: var(--gold-light);
  border-color: rgba(212,175,55,0.35);
}

.q-chip.checked {
  background: rgba(46,125,50,0.25);
  color: #a5d6a7;
  border-color: rgba(46,125,50,0.4);
}

/* Sidebar actions */
.sidebar-actions {
  padding: 12px 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  flex-shrink: 0;
  border-top: 1px solid rgba(212,175,55,0.15);
}

.btn-sidebar {
  width: 100%;
  padding: 9px 14px;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  border: 1px solid;
}

.btn-show-keys {
  background: var(--gold);
  color: var(--navy);
  border-color: var(--gold);
}

.btn-show-keys:hover {
  background: var(--gold-light);
  box-shadow: 0 3px 12px rgba(212,175,55,0.4);
}

.btn-clear-hl {
  background: transparent;
  color: rgba(255,255,255,0.55);
  border-color: rgba(255,255,255,0.2);
}

.btn-clear-hl:hover {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.85);
  border-color: rgba(255,255,255,0.35);
}

/* ── MAIN CONTENT ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
  min-width: 0;
}

/* Top bar */
#topbar {
  height: 52px;
  min-height: 52px;
  background: var(--cream);
  border-bottom: 1px solid var(--cream-border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
}

.topbar-title {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  color: var(--navy);
  font-style: italic;
}

.topbar-meta {
  font-size: 11px;
  color: var(--ink-muted);
  font-weight: 500;
}

.topbar-passage-badge {
  margin-left: auto;
  background: var(--gold-pale);
  border: 1px solid var(--gold-border);
  color: #8a6b00;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 0.05em;
}

/* Split pane */
#split-container {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}

/* Left: Passage */
#passage-pane {
  width: 50%;
  min-width: 280px;
  overflow-y: auto;
  padding: 24px 28px;
  background: var(--cream);
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: var(--cream-border) transparent;
}

/* Splitter */
#splitter {
  width: 5px;
  background: var(--cream-border);
  cursor: col-resize;
  flex-shrink: 0;
  position: relative;
  transition: background 0.2s;
  user-select: none;
}

#splitter:hover, #splitter.dragging {
  background: var(--gold);
}

#splitter::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 3px;
  height: 40px;
  background: rgba(212,175,55,0.5);
  border-radius: 4px;
}

/* Right: Questions */
#questions-pane {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  background: var(--cream-deep);
  min-width: 280px;
  scrollbar-width: thin;
  scrollbar-color: var(--cream-border) transparent;
}

/* ═══════════════════════════════════════════
   PASSAGE STYLES
═══════════════════════════════════════════ */
.passage-header {
  margin-bottom: 20px;
}

.passage-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 6px;
}

.passage-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  color: var(--navy);
  line-height: 1.3;
  margin-bottom: 4px;
}

.passage-source {
  font-size: 11px;
  color: var(--ink-muted);
  font-style: italic;
}

.passage-divider {
  width: 48px;
  height: 2px;
  background: var(--gold);
  margin: 14px 0;
  border-radius: 2px;
}

.passage-body {
  font-size: 14px;
  line-height: 1.85;
  color: var(--ink);
  user-select: text;
}

.passage-body p {
  margin-bottom: 14px;
}

.passage-body .para-label {
  font-weight: 700;
  color: var(--navy);
  font-size: 12px;
}

mark.hl-yellow {
  background: var(--highlight);
  border-radius: 2px;
  padding: 0 1px;
  cursor: pointer;
  transition: background 0.15s;
}

mark.hl-yellow:hover {
  background: #ffee33;
  text-decoration: line-through;
  text-decoration-color: rgba(0,0,0,0.3);
}

/* Highlight toolbar */
#hl-toolbar {
  position: fixed;
  display: none;
  background: var(--navy);
  border-radius: 20px;
  padding: 5px 8px;
  gap: 4px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.28);
  z-index: 2000;
  align-items: center;
  pointer-events: auto;
  transform: translateX(-50%);
}

#hl-toolbar.visible {
  display: flex;
}

/* small arrow under toolbar */
#hl-toolbar::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: var(--navy);
}

.hl-btn {
  padding: 5px 14px;
  background: var(--gold);
  color: var(--navy);
  border: none;
  border-radius: 14px;
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.15s;
  white-space: nowrap;
}

.hl-btn:hover { background: var(--gold-light); }

/* ═══════════════════════════════════════════
   QUESTION GROUP STYLES
═══════════════════════════════════════════ */
.q-group {
  margin-bottom: 28px;
}

.q-group-header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--cream-border);
}

.q-group-num {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold);
}

.q-group-instruction {
  font-size: 12px;
  color: var(--ink-soft);
  line-height: 1.5;
  background: rgba(212,175,55,0.07);
  border-left: 3px solid var(--gold);
  padding: 8px 12px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin-bottom: 14px;
}

/* Individual question card */
.q-card {
  background: var(--cream);
  border: 1px solid var(--cream-border);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s;
}

.q-card:hover {
  box-shadow: var(--shadow-md);
}

.q-card-top {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.q-num-badge {
  min-width: 26px;
  height: 26px;
  background: var(--navy);
  color: var(--gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 1px;
}

.q-content {
  flex: 1;
}

.q-stem {
  font-size: 13px;
  color: var(--ink);
  line-height: 1.5;
  margin-bottom: 8px;
}

/* MCQ options */
.q-options {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 8px;
}

.q-option {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  background: var(--cream-deep);
  border: 1px solid var(--cream-border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 12px;
}

.q-option:hover {
  background: var(--gold-pale);
  border-color: var(--gold-border);
}

.q-option.selected {
  background: var(--gold-pale);
  border-color: var(--gold);
}

.opt-letter {
  width: 20px;
  height: 20px;
  background: white;
  border: 1px solid var(--cream-border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--ink-muted);
  flex-shrink: 0;
}

.q-option.selected .opt-letter {
  background: var(--gold);
  border-color: var(--gold);
  color: white;
}

/* Teacher answer input */
.teacher-input-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.teacher-input {
  flex: 1;
  padding: 7px 12px;
  background: white;
  border: 1px solid var(--cream-border);
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--ink);
  outline: none;
  transition: border 0.15s;
}

.teacher-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(212,175,55,0.12);
}

.btn-check {
  padding: 7px 16px;
  background: var(--navy);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}

.btn-check:hover {
  background: var(--navy-mid);
  box-shadow: 0 3px 10px rgba(27,42,74,0.3);
}

/* Correction panel */
.correction-panel {
  display: none;
  margin-top: 10px;
  border-top: 1px dashed var(--cream-border);
  padding-top: 10px;
  flex-direction: column;
  gap: 8px;
}

.correction-panel.open { display: flex; }

.correct-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  font-size: 12px;
}

.correct-row.key-row {
  background: var(--success-bg);
  border: 1px solid #c8e6c9;
}

.correct-row.explain-row {
  background: #fff8e1;
  border: 1px solid #ffe082;
}

.correct-row.evidence-row {
  background: var(--evidence-bg);
  border: 1px solid var(--evidence-border);
  padding: 0;
  overflow: hidden;
}

.evidence-row-inner {
  display: flex;
  flex-direction: column;
  width: 100%;
}

.evidence-top {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 12px 6px;
}

.btn-view-evidence {
  width: 100%;
  padding: 7px 12px;
  background: rgba(144,202,249,0.18);
  border: none;
  border-top: 1px solid var(--evidence-border);
  color: #1565c0;
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
}

.btn-view-evidence:hover {
  background: rgba(144,202,249,0.35);
  color: #0d47a1;
}

.btn-view-evidence.active {
  background: #1565c0;
  color: white;
}

/* Flash animation for evidence in passage */
@keyframes evidenceFlash {
  0%   { background: #ffeb3b; box-shadow: 0 0 0 3px #ffeb3b; }
  30%  { background: #fff176; box-shadow: 0 0 0 5px rgba(255,235,59,0.5); }
  70%  { background: #fff9c4; box-shadow: 0 0 0 3px rgba(255,235,59,0.2); }
  100% { background: #fff59d; box-shadow: none; }
}

.evidence-flash {
  animation: evidenceFlash 2s ease-out forwards;
  border-radius: 3px;
}

.cr-icon {
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 1px;
}

.cr-label {
  font-weight: 700;
  margin-right: 4px;
  flex-shrink: 0;
}

.cr-content {
  color: var(--ink-soft);
  line-height: 1.5;
}

.cr-content strong { color: var(--ink); }

/* Key highlight in evidence */
.evidence-keyword {
  background: var(--highlight);
  border-radius: 2px;
  padding: 0 2px;
  font-weight: 600;
}

/* Show all keys panel */
.all-keys-panel {
  display: none;
  position: fixed;
  top: 52px;
  right: 0;
  width: 320px;
  height: calc(100vh - 52px);
  background: white;
  border-left: 1px solid var(--cream-border);
  box-shadow: -4px 0 24px rgba(0,0,0,0.1);
  z-index: 100;
  overflow-y: auto;
  padding: 20px;
}

.all-keys-panel.open { display: block; }

.all-keys-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--gold);
}

.all-keys-title {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  color: var(--navy);
}

.btn-close-keys {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--cream-border);
  background: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--ink-muted);
  transition: all 0.15s;
}

.btn-close-keys:hover {
  background: var(--cream-deep);
  color: var(--ink);
}

.key-table {
  width: 100%;
  border-collapse: collapse;
}

.key-table tr {
  border-bottom: 1px solid var(--cream-border);
}

.key-table tr:last-child { border-bottom: none; }

.key-table td {
  padding: 7px 8px;
  font-size: 12px;
}

.key-table .kt-num {
  width: 36px;
  font-weight: 700;
  color: var(--ink-muted);
}

.key-table .kt-key {
  font-weight: 600;
  color: var(--navy);
}

.key-table .kt-type {
  font-size: 10px;
  color: var(--ink-muted);
  text-align: right;
}

.key-table tr:nth-child(even) td { background: var(--cream-deep); }

/* Scrollbar styling */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--cream-border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #c8bfb0; }

/* ── SIDEBAR VIEWS ── */
#sidebar-view-questions {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

#sidebar-view-questions.hidden { display: none; }

#sidebar-view-report {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px 20px;
  gap: 10px;
  min-height: 0;
}

#sidebar-view-report.visible { display: flex; }

#report-content {
  display: none;
  flex-direction: column;
  gap: 10px;
}

#report-content.visible { display: flex; }

/* ── SIDEBAR NAV TABS ── */
.sidebar-nav {
  display: flex;
  gap: 0;
  padding: 10px 14px 0;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.snav-tab {
  flex: 1;
  padding: 8px 4px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: rgba(255,255,255,0.4);
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.snav-tab:hover { color: rgba(255,255,255,0.75); }

.snav-tab.active {
  color: var(--gold-light);
  border-bottom-color: var(--gold);
}

               "C. ...",

             ],
             key: string,    // Đáp án đúng. MCQ: "A"/"B"/"C"/"D". T/F/NG: "TRUE"/"FALSE"/"NOT GIVEN"
                             // Short Answer: từ/cụm từ trích từ bài. Nhiều đáp án: "ans1 / ans2"

       }

═══════════════════════════════════════════════════════════════ */
const TEACHER_DATA = {
  meta: {
    title: "IELTS Academic Reading",

  passages: [
    /* ── PASSAGE 1 ── */
    {
      id: 0,
      title: "Charles Heaphy and the settlement of New Zealand",
      source: "How did the work of an English artist influence European migration to New Zealand?",
      qRange: [1, 13],
      paragraphs: [
        { label: "A", text: "In the early 19th century, the London-based New Zealand Company was set up to promote the colonisation of the North and South Islands of New Zealand. It hoped to encourage British migrants to settle there and buy land. To do this, it needed to capture the public imagination, and used paintings and drawings of the landscape for this purpose. Eighteen was a young age for someone to become a hired artist and explorer for this kind of major land-trading company, but Charles Heaphy took on this role after 18 months producing technical drawings for a British railway company, and a further two years studying occasionally at the Royal Academy's school of painting. His family had possibly lacked the financial means to enable him to continue at the Academy, but he was luckily introduced to someone in the New Zealand Company. Heaphy was offered, and accepted, a position on 6 May 1839 - three days before the Company's ship, Tory, departed Plymouth for New Zealand with its cargo of settlers." },
        { label: "B", text: "From his diaries, we can see that Heaphy was enthusiastic about this role. In addition to employment and position, it offered him the chance to explore a relatively little-known country. There was, however, some urgency placed on the young artist, as a large consignment of settlers was due to leave England a few months later, and so he needed to explore the country before they departed as efficiently as he could. His record of his travels through New Zealand is less comprehensive than those of some contemporaries, but what he did end up committing to paper and in paintings left an often vivid impression of travelling through various parts of the country." },
        { label: "C", text: "As is so often the case, though, his high expectations were dampened on arrival. On first sighting New Zealand's South Island, Heaphy commented that the high mountain ranges seemed to leave no space for farming, and that the country in general hardly seemed worth settling. However, Heaphy hoped there might be other agricultural opportunities somewhere in the interior. Queen Charlotte Sound was the first place Heaphy visited. He remained unconvinced for years afterwards that it possessed the greatest harbour in the country but accepted that the few patches of fertile ground in the area were insufficient for a major settlement. From there, he went to Port Nicholson and was clearly impressed." },
        { label: "D", text: "However, his interpretations of this and many of the other locations he travelled through in the country were possibly not as 'neutral' as they may appear. His choice of scenes, and the organisation of elements in many of his paintings suggest that his artistic view of the landscape was perhaps restricted by the requirements placed on him by his employer, the New Zealand Company. Indeed, his paintings of Port Nicholson could easily be mistaken for paintings of English country villages." },
        { label: "E", text: "Although Heaphy travelled widely around New Zealand, his explorations frequently were superficial at best, and there is a sense from Heaphy's records that as he observed the North Island, he and his colleagues' minds had already been made up regarding the superiority of Port Nicholson. This was the site they nominated for the New Zealand Company's headquarters." },
        { label: "F", text: "As ever more New Zealand Company migrants were being tempted to settle in New Zealand, the pressing demand for land forced officials to reconsider regions that they had previously ruled out. Heaphy accompanied one journey north from Port Nicholson to assess what parts of the country might be useful to establish new townships and farming districts on. One of the first places Heaphy's team went to was Porirua. They found that the hills between Port Nicholson and Porirua were easy to cross and did not form the barrier they had expected, and were also of exceedingly rich and fertile soil, making them a potential location for agriculture. Heaphy depicted this possible place for settlement as having the beautiful appearance of a park, and thought most of it was fit for cultivation. Its harbour was also suitably deep." },
        { label: "G", text: "From there Heaphy sailed further north, eventually reaching the Manawatu Plains. His assessment was again favourable, praising the level aspect of the plains and the way they were watered by numerous rivers. These, he said, were deep enough for the passage of small ships. Writing to the New Zealand Company, he was confident that the countryside there was well adapted for settlement, but explained that this could only be accomplished by the growth of the population of places already colonised. In the future, he envisaged, the region would become a major agricultural centre." },
        { label: "H", text: "As for the Taranaki region, Heaphy was even more impressed. His artistic response, Mt Egmont from the Southward, shows an image of the mountain that became his most famous painting. Despite the work being highly symmetrical, and the proportions being exaggerated, Heaphy turned this scene into a great piece of artistic propaganda. The foreground, with its small cleared section above a sandy shore, would have looked inviting to any would-be farmer, as would the forest in the middle ground, suggesting a ready supply of trees which could be exploited for the construction of homes and ships." },
        { label: "I", text: "Other beneficial aspects of living in New Zealand were discovered by Heaphy as he travelled around. He was convinced it had the best climate in the world, and claimed that since the formation of the first Company settlement in Port Nicholson, almost no-one there had fallen sick. Indeed, Heaphy boasted that during his explorations, he had slept outside in all seasons and had never experienced a day's illness, certainly not the respiratory kind common in congested English cities. He certainly concluded that for anyone migrating to New Zealand, good prospects awaited." }
      ]
    },
    /* ── PASSAGE 2 ── */
    {
      id: 1,
      title: "Bird Migration",
      source: "",
      qRange: [14, 26],
      paragraphs: [
        { label: "A", text: "Birds have many unique design features that enable them to perform such amazing feats of endurance. They are equipped with lightweight, hollow bones, intricately designed feathers providing both lift and thrust for rapid flight, navigation systems superior to any that man has developed, and an ingenious heat-conserving design that, among other things, concentrates all blood circulation beneath layers of warm, waterproof plumage, leaving them fit to face life in the harshest of climates. Their respiratory systems have to perform efficiently during sustained flights at altitude, so they have a system of extracting oxygen from their lungs that far exceeds that of any other animal. During the later stages of the summer breeding season, when food is plentiful, their bodies can accumulate considerable layers of fat, to provide sufficient energy for their long migratory flights." },
        { label: "B", text: "The fundamental reason that birds migrate is to find adequate food during the winter months when it is in short supply. This particularly applies to birds that breed in the temperate and Arctic regions of the Northern Hemisphere, where food is abundant during the short growing season. Many species can tolerate cold temperatures if food is plentiful, but when food is not available, they must migrate. However, intriguing questions remain." },
        { label: "C", text: "One puzzling fact is that many birds journey much further than would be necessary just to find food and good weather. Nobody knows, for instance, why British swallows, which could presumably survive equally well if they spent the winter in equatorial Africa, instead of flying several thousand miles further to their preferred winter home in South Africa's Cape Province. Another mystery involves the huge migrations performed by arctic terns and mudflat-feeding shorebirds that breed close to Polar Regions. In general, the further north a migrant species breeds, the further south it spends the winter. For arctic terns, this necessitates an annual round trip of 25,000 miles. Yet, en route to their final destination in far-flung southern latitudes, all these individuals overfly other areas of seemingly suitable habitat spanning two hemispheres. While we may not fully understand birds' reasons for going to particular places, we can marvel at their feats." },
        { label: "D", text: "One of the greatest mysteries is how young birds know how to find the traditional wintering areas without parental guidance. Very few adults migrate with juveniles in tow, and youngsters may even have little or no inkling of their parents' appearance. A familiar example is that of the cuckoo, which lays its eggs in another species' nest and never re-encounters its young. It is mind-boggling to consider that, once raised by its host species, the young cuckoo makes its way to ancestral wintering grounds in the tropics before returning single-handedly to northern Europe the next season to seek out a mate among its kind. The obvious implication is that it inherits from its parents an inbuilt route map and direction-finding capability, as well as a mental image of what another cuckoo looks like. Yet nobody has the slightest idea as to how this is possible." },
        { label: "E", text: "Mounting evidence has confirmed that birds use the positions of the sun and stars to obtain compass directions. They also seem to be able to detect the earth's magnetic field, probably due to having minute crystals of magnetite in the region of their brains. However, accurate navigation also requires an awareness of position and time, especially when lost. Experiments have shown that after being taken thousands of miles over an unfamiliar landmass, birds are still capable of returning rapidly to nest sites. Such phenomenal powers are the product of computing several sophisticated cues, including an inborn map of the night sky and the pull of the earth's magnetic field. How the birds use their 'instruments' remains unknown, but one thing is clear: they see the world with a superior sensory perception to ours. Most small birds migrate at night and take their direction from the position of the setting sun. However, as well as seeing the sun go down, they also seem to see the plane of polarized light caused by it, which calibrates their compass. Travelling at night provides other benefits. Daytime predators are avoided and the danger of dehydration due to flying for long periods in warm, sunlit skies is reduced. Furthermore, at night the air is generally cool and less turbulent and so conducive to sustained, stable flight." },

      paragraphs: [
        { label: "A", text: "When did we start talking to each other and how long did it take us to become so good at it? One view of language development, held by linguists such as Noam Chomsky and anthropologists such as Richard Klein, is that language, specifically the spoken word, appeared suddenly among modern humans a mere 35,000 to 50,000 years ago and that the ability to speak words and use syntax was recently genetically hard wired into our brains in a kind of language organ. This view of language is associated with the old idea that logical thought is dependent on words, a concept originating with Plato and much in vogue in the 19th century – that is, animals do not speak because they do not think. However, the abstract thought demonstrated in 20th century experiments with chimpanzees and bonobos put this theory in doubt." },
        { label: "B", text: "An alternative to the Chomskian theory is that language developed as a series of inventions. This was first suggested by the 18th century philosopher Etienne Bonnot de Condillac. He argued that spoken language had developed out of gesture language (langage d'action) and that both were inventions arising initially from the simple association between action and object. The theory sees gesture language as arising originally among apes as sounds accompanying gestures, with these sounds gradually becoming coded into 'words' as the new skill drove its own evolution. Subsequently, coded words developed into deliberate, complex communication. Evolutionary pressures promoted the development of an anatomy geared to speech - the larynx, vocal muscles and a specific part of the brain immediately next to the part responsible for gestures." },
        { label: "C", text: "The view that spoken language was ultimately a cultural invention like tool-making, which then drove the biological evolution of the brain and vocal apparatus, seems obvious when you think of the development of different languages. The unique features of a language such as French clearly do not result from any physiological aspect of being French, but are the cultural possessions of the French-speaking community. Each language evolves from one generation to the next, constantly adapting itself to cope with the learning biases of each new set of young, immature minds." },
        { label: "D", text: "Those anthropologists and fossil experts who accept that speech started early still tend to think of language evolution as a gradual 2 million year process, with our own modern human species (homo sapiens) way out at the top. A major reason for this is the perception that brain growth among humans was gradual over a similar period. Several recent changes in the fossil evidence though, bring this into doubt." },
        { label: "E", text: "The first of these is a re-dating of soil layers from the famous Olduvai Gorge in East Africa, where many key fossil remains have been found. A number of big-brained human species appear to be much older than previously thought, with several specimens dating from over a million years ago. When brain sizes for all available skulls are plotted against time using the revised dates, the result is startling; the bulk of increases in brain size was over by around 1.2 million years ago, with some African human species having brain volumes easily within the modern human range by that time." },
        { label: "F", text: "So, we have the paradox that over the period when our brain was growing most rapidly, our material cultural development, as measured by stone tools, advanced only marginally; then, over a million years later, when the development of anatomically modern humans finally started to accelerate, artistically and technologically, our brains were actually getting smaller. The additional piece of evidence that makes this paradox all the more significant is that brain size did not just leap between human species in a direct line of ascent towards ourselves. Over the period from 2.5 to 1.5 million years ago, brains were growing more rapidly than at any time since, within all the different human species. The logical conclusion is that there must have been a unique new behaviour driving brain growth, shared between all species of humans." },
        { label: "G", text: "So, what was driving rapid brain growth right at the beginning, 2.5 million years ago? The answer may have been staring us in the face. Namely, that not only early humans, but their ancestors, had started the trend in the very useful skill of verbal communication. Around 2.5 million years ago, the weather took a decided turn for the worse, becoming more variable and colder and drier. The search for food became more taxing, and there would have been a real need to communicate more effectively and cope with the worsening environment in a co-operative way. The near maximum in brain size achieved by 1.2 million years ago indicates that those early ancestors could already have been talking perfectly well. Our brain, which had developed to manipulate and organise complex symbolic aspects of speech internally, could now be turned to a variety of other tasks." },
        { label: "H", text: "So what happened in the million-year gap after that? Why did we take so long to get to the moon? Cultural evolution aided by communication and teaching is a cumulative interactive process. If each new generation invented just one new skill or idea and passed it on with the rest to their children and cousins, you could predict exactly the same curve of cultural advance as we see from the archaeological and historical record - first very slow, then faster and faster." }
      ]

function buildQuestionMap() {
  const grid = document.getElementById('q-map');
  grid.innerHTML = '';
  for (let i = 1; i <= TEACHER_DATA.meta.totalQuestions; i++) {
    const chip = document.createElement('div');
    chip.className = 'q-chip';
    chip.textContent = i;
    chip.id = `qchip-${i}`;
    chip.onclick = () => scrollToQuestion(i);
    grid.appendChild(chip);
  }
}

function scrollToQuestion(id) {
  const el = document.getElementById(`q-card-${id}`);
  if (el) {
    // Switch passage if needed
    const qData = findQuestionById(id);
    if (qData && qData.passageId !== currentPassage) {
      switchPassage(qData.passageId);
      setTimeout(() => {
        const el2 = document.getElementById(`q-card-${id}`);
        if (el2) el2.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 50);
    } else {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
}

function findQuestionById(id) {
  for (const group of TEACHER_DATA.questions) {
    for (const item of group.items) {
      if (item.id === id) return { ...item, passageId: group.passageId };
    }
  }
  return null;
}

function updateChipState(id, state) {
  const chip = document.getElementById(`qchip-${id}`);
  if (!chip) return;
  chip.classList.remove('answered', 'checked');
  if (state) chip.classList.add(state);
}

/* ═══════════════════════════════════════════════════════════════
   PASSAGE RENDERER
═══════════════════════════════════════════════════════════════ */
function renderPassage(passageIdx) {
  const p = TEACHER_DATA.passages[passageIdx];
  const container = document.getElementById('passage-content');
  document.getElementById('passage-badge').textContent = `Passage ${passageIdx + 1}`;

  let html = `
    <div class="passage-header">
      <div class="passage-eyebrow">Reading Passage ${passageIdx + 1} · Questions ${p.qRange[0]}–${p.qRange[1]}</div>
      <div class="passage-title">${p.title}</div>
      <div class="passage-source">${p.source}</div>
      <div class="passage-divider"></div>
    </div>
    <div class="passage-body" id="passage-body-${passageIdx}">
  `;

  for (const para of p.paragraphs) {
    html += `<p><span class="para-label">${para.label}</span>&nbsp;&nbsp;${para.text}</p>`;
  }

  html += `</div>`;
  container.innerHTML = html;
}

/* ═══════════════════════════════════════════════════════════════
   QUESTIONS RENDERER
═══════════════════════════════════════════════════════════════ */
function renderQuestions(passageIdx) {
  const container = document.getElementById('questions-content');
  const groups = TEACHER_DATA.questions.filter(g => g.passageId === passageIdx);

  if (!groups.length) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">📄</div>
      <div class="empty-state-title">No questions</div>
      <div class="empty-state-sub">No questions found for this passage.</div>
    </div>`;
    return;
  }

  let html = '';
  for (const group of groups) {
    const firstId = group.items[0].id;
    const lastId = group.items[group.items.length - 1].id;

    html += `<div class="q-group">
      <div class="q-group-header">
        <span class="q-group-num">Questions ${firstId}–${lastId}</span>
        <span class="q-type-badge" onclick="openTipsPanel('${group.type}')">
          <span class="tip-icon">💡</span>${group.type}
        </span>
      </div>
      <div class="q-group-instruction">${group.instruction}</div>`;

    for (const item of group.items) {
      const isMCQ = !!item.options;
      html += `<div class="q-card" id="q-card-${item.id}">
        <div class="q-card-top">
          <div class="q-num-badge">${item.id}</div>
          <div class="q-content">
            <div class="q-stem">${item.stem}</div>`;

      if (isMCQ) {
        html += `<div class="q-options">`;
        for (const opt of item.options) {
          const letter = opt[0];
          html += `<div class="q-option" onclick="selectOption(${item.id}, '${letter}', this)">
            <div class="opt-letter">${letter}</div>
            <span>${opt.substring(3)}</span>
          </div>`;
        }
        html += `</div>`;
      } else {
        html += `<div class="teacher-input-wrap">
          <input class="teacher-input" id="teacher-input-${item.id}" 
            type="text" placeholder="Nhập đáp án học sinh…"
            onkeydown="if(event.key==='Enter') checkAnswer(${item.id})">
        </div>`;
      }

      html += `
            <div style="display:flex;gap:6px;">
              <button class="btn-check" onclick="checkAnswer(${item.id})">Check →</button>
            </div>
            <div class="correction-panel" id="correction-${item.id}">
              <div class="correct-row key-row">
                <span class="cr-icon">✅</span>
                <span class="cr-content"><span class="cr-label">Key:</span> <strong>${item.key}</strong></span>
              </div>
              <div class="correct-row explain-row">
                <span class="cr-icon">💡</span>
                <span class="cr-content"><span class="cr-label">Giải thích:</span> ${item.explanation}</span>
              </div>
              <div class="correct-row evidence-row">
                <div class="evidence-row-inner">
                  <div class="evidence-top">
                    <span class="cr-icon">🔍</span>
                    <span class="cr-content"><span class="cr-label">Evidence:</span> "…${highlightEvidence(item.evidence, item.key)}…"</span>
                  </div>
                  <button class="btn-view-evidence" onclick="viewEvidenceInPassage(this)" data-evidence="${item.evidence.replace(/"/g,'&quot;')}">
                    📍 Xem trong bài
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }
    html += `</div>`;
  }

  container.innerHTML = html;

  // Restore checked states
  for (const [id, state] of Object.entries(checkedQuestions)) {
    if (state) {
      const panel = document.getElementById(`correction-${id}`);
      if (panel) panel.classList.add('open');
    }
  }
}

function highlightEvidence(evidence, key) {
  if (!evidence) return '';
  const keywords = key.split(/[\s,\/]+/).filter(w => w.length > 2);
  let result = evidence;
  for (const kw of keywords) {
    const re = new RegExp(`(${kw})`, 'gi');
    result = result.replace(re, `<span class="evidence-keyword">$1</span>`);
  }
  return result;
}

/* ═══════════════════════════════════════════════════════════════
   VIEW EVIDENCE IN PASSAGE
   Finds the evidence phrase inside the passage pane, scrolls to it,
   wraps it in a temporary flash span, then removes it after 3s.
═══════════════════════════════════════════════════════════════ */
let _activeEvidenceBtn = null;
let _activeFlashSpans = [];

function viewEvidenceInPassage(btn) {
  const evidenceText = btn.dataset.evidence;
  if (!evidenceText) return;

  // Toggle off if same button clicked again
  if (_activeEvidenceBtn === btn) {
    clearEvidenceFlash();
    return;
  }

  // Clear any previous flash
  clearEvidenceFlash();

  _activeEvidenceBtn = btn;
  btn.classList.add('active');
  btn.textContent = '✕ Đang xem…';

  const passagePane = document.getElementById('passage-pane');

  // Build a clean search string (collapse whitespace)
  const searchStr = evidenceText.replace(/\s+/g, ' ').trim();

  // Use TreeWalker to find the text node(s) containing the phrase
  const result = findTextInPane(passagePane, searchStr);

  if (!result) {
    btn.textContent = '⚠ Không tìm thấy';
    btn.classList.remove('active');
    setTimeout(() => { btn.textContent = '📍 Xem trong bài'; }, 2000);
    _activeEvidenceBtn = null;
    return;
  }

  // Wrap the matched range in flash spans (may span nodes)
  const flashSpans = wrapRangeWithFlash(result);
  _activeFlashSpans = flashSpans;

  // Scroll the first span into view in the passage pane
  if (flashSpans.length > 0) {
    flashSpans[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // Auto-clear after 3.5s
  setTimeout(() => {
    if (_activeEvidenceBtn === btn) clearEvidenceFlash();
  }, 3500);
}

function clearEvidenceFlash() {
  _activeFlashSpans.forEach(span => {
    const parent = span.parentNode;
    if (!parent) return;
    while (span.firstChild) parent.insertBefore(span.firstChild, span);
    parent.removeChild(span);
    try { parent.normalize(); } catch(e) {}
  });
  _activeFlashSpans = [];

  if (_activeEvidenceBtn) {
    _activeEvidenceBtn.classList.remove('active');
    _activeEvidenceBtn.textContent = '📍 Xem trong bài';
    _activeEvidenceBtn = null;
  }
}

/**
 * Find `searchStr` across text nodes inside `container`.
 * Returns a Range covering the match, or null.
 */
function findTextInPane(container, searchStr) {
  // Concatenate all text node content with bookmarks to map back positions
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null);
  const nodes = [];
  let node;
  while ((node = walker.nextNode())) nodes.push(node);

  // Build a single string from all text, track node boundaries
  let fullText = '';
  const nodeMap = []; // { node, start, end }
  for (const n of nodes) {
    const start = fullText.length;
    fullText += n.textContent;
    nodeMap.push({ node: n, start, end: fullText.length });
  }

  // Normalise whitespace in fullText for matching (but keep original nodes)
  // We search on a whitespace-collapsed shadow, mapping indices back
  const shadowText = fullText.replace(/\s+/g, ' ');
  const searchNorm = searchStr.replace(/\s+/g, ' ');

  // Build index map: shadowText[i] → fullText index
  const shadowToFull = [];
  let fi = 0;
  let prevWasSpace = false;
  for (let si = 0; si < fullText.length; si++) {
    const ch = fullText[si];
    const isSpace = /\s/.test(ch);
    if (isSpace) {
      if (!prevWasSpace) {
        shadowToFull.push(si);
        prevWasSpace = true;
      }
      // collapsed — don't push
    } else {
      shadowToFull.push(si);
      prevWasSpace = false;
    }
  }

  const matchIdx = shadowText.indexOf(searchNorm);
  if (matchIdx < 0) return null;

  const fullStart = shadowToFull[matchIdx] ?? matchIdx;
  const fullEnd   = (shadowToFull[matchIdx + searchNorm.length - 1] ?? (matchIdx + searchNorm.length - 1)) + 1;

  // Map fullText positions back to DOM nodes
  function nodeAtPos(pos) {
    for (const nm of nodeMap) {
      if (pos >= nm.start && pos < nm.end) {
        return { node: nm.node, offset: pos - nm.start };
      }
    }
    // edge case: end of last node
    const last = nodeMap[nodeMap.length - 1];
    return { node: last.node, offset: last.node.textContent.length };
  }

  const startInfo = nodeAtPos(fullStart);
  const endInfo   = nodeAtPos(fullEnd);

  const range = document.createRange();
  range.setStart(startInfo.node, startInfo.offset);
  range.setEnd(endInfo.node, endInfo.offset);
  return range;
}

/**
 * Wrap a Range (possibly multi-node) with <span class="evidence-flash"> elements.
 * Returns array of spans created.
 */
function wrapRangeWithFlash(range) {
  const passagePane = document.getElementById('passage-pane');
  const walker = document.createTreeWalker(
    range.commonAncestorContainer.nodeType === Node.TEXT_NODE
      ? range.commonAncestorContainer.parentNode
      : range.commonAncestorContainer,
    NodeFilter.SHOW_TEXT,
    null
  );

  const nodes = [];
  let node;
  while ((node = walker.nextNode())) {
    if (!passagePane.contains(node)) continue;
    if (!range.intersectsNode(node)) continue;
    nodes.push(node);
  }

  const spans = [];
  nodes.forEach(textNode => {
    let start = 0;
    let end = textNode.length;
    if (textNode === range.startContainer) start = range.startOffset;
    if (textNode === range.endContainer)   end   = range.endOffset;
    if (start >= end) return;

    const before = textNode.splitText(start);
    before.splitText(end - start);

    const span = document.createElement('span');
    span.className = 'evidence-flash';
    before.parentNode.insertBefore(span, before);
    span.appendChild(before);
    spans.push(span);
  });

  return spans;
}

/* ═══════════════════════════════════════════════════════════════
   PASSAGE SWITCHING
═══════════════════════════════════════════════════════════════ */
function switchPassage(idx) {
  currentPassage = idx;

  // Update tabs
  document.querySelectorAll('.passage-tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });

  renderPassage(idx);
  renderQuestions(idx);

  // Scroll both panes to top
  document.getElementById('passage-pane').scrollTop = 0;
  document.getElementById('questions-pane').scrollTop = 0;
}

/* ═══════════════════════════════════════════════════════════════
   MCQ SELECTION
═══════════════════════════════════════════════════════════════ */
function selectOption(qId, letter, el) {
  const card = document.getElementById(`q-card-${qId}`);
  card.querySelectorAll('.q-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  el.dataset.selected = letter;
  updateChipState(qId, 'answered');
}

/* ═══════════════════════════════════════════════════════════════
   CHECK ANSWER
═══════════════════════════════════════════════════════════════ */
function checkAnswer(qId) {
  const panel = document.getElementById(`correction-${qId}`);
  if (!panel) return;

  panel.classList.add('open');
  checkedQuestions[qId] = true;
  updateChipState(qId, 'checked');

  // Determine correctness for report
  const qData = findQuestionById(qId);
  if (qData) {
    let studentAnswer = '';
    let isCorrect = false;

    if (qData.options) {
      // MCQ — find selected option
      const card = document.getElementById(`q-card-${qId}`);
      const selected = card ? card.querySelector('.q-option.selected') : null;
      studentAnswer = selected ? selected.dataset.selected : '';
      isCorrect = studentAnswer.toUpperCase() === qData.key.toUpperCase();
    } else {
      // Text input
      const input = document.getElementById(`teacher-input-${qId}`);
      studentAnswer = input ? input.value.trim() : '';
      // Flexible match: lowercase, trim
      const norm = s => s.toLowerCase().replace(/[^a-z0-9\s]/g,'').trim();
      isCorrect = norm(studentAnswer) === norm(qData.key) ||
        (qData.key.includes('/') && qData.key.split('/').some(k => norm(k) === norm(studentAnswer)));
    }

    registerStudentAnswer(qId, studentAnswer, isCorrect);
  }

  setTimeout(() => {
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

/* ═══════════════════════════════════════════════════════════════
   ALL KEYS TABLE
═══════════════════════════════════════════════════════════════ */
function buildAllKeysTable() {
  const table = document.getElementById('key-table-body');
  let html = '';
  for (const group of TEACHER_DATA.questions) {
    for (const item of group.items) {
      html += `<tr>
        <td class="kt-num">${item.id}</td>
        <td class="kt-key">${item.key}</td>
        <td class="kt-type">${group.type.split(' ').slice(0,2).join(' ')}</td>
      </tr>`;
    }
  }
  table.innerHTML = html;
}

function toggleAllKeys(show) {
  document.getElementById('all-keys-panel').classList.toggle('open', show);
}

/* ═══════════════════════════════════════════════════════════════
   HIGHLIGHT TOOL — robust multi-node, cursor-anchored, click-to-remove
═══════════════════════════════════════════════════════════════ */
let _hlMouseX = 0;
let _hlMouseY = 0;
let _pendingRange = null;

function setupHighlightTool() {
  const toolbar = document.getElementById('hl-toolbar');
  const passagePane = document.getElementById('passage-pane');

  // Track mouse position at all times for accurate toolbar placement
  document.addEventListener('mousemove', (e) => {
    _hlMouseX = e.clientX;
    _hlMouseY = e.clientY;
  });

  // Click on an existing highlight → remove it
  passagePane.addEventListener('click', (e) => {
    const mark = e.target.closest('mark.hl-yellow');
    if (mark) {
      removeHighlight(mark);
      e.stopPropagation();
      return;
    }
  });

  // After mouseup: check if there's a real selection inside the passage
  document.addEventListener('mouseup', (e) => {
    // Ignore clicks inside the toolbar itself
    if (toolbar.contains(e.target)) return;

    // Small delay so selection is settled
    setTimeout(() => {
      const sel = window.getSelection();

      if (!sel || sel.isCollapsed || sel.toString().trim() === '') {
        hideToolbar();
        return;
      }

      // Verify selection is inside the passage pane
      const range = sel.getRangeAt(0);
      if (!passagePane.contains(range.commonAncestorContainer)) {
        hideToolbar();
        return;
      }

      // Store the range for later use when button is clicked
      _pendingRange = range.cloneRange();

      // Position toolbar above where the mouse is
      showToolbarAt(_hlMouseX, _hlMouseY - 52);
    }, 10);
  });

  // Hide toolbar on mousedown outside
  document.addEventListener('mousedown', (e) => {
    if (!toolbar.contains(e.target)) {
      hideToolbar();
    }
  });

  // Hide on scroll (re-anchoring is complex; just hide)
  document.getElementById('passage-pane').addEventListener('scroll', () => {
    hideToolbar();
  });
}

function showToolbarAt(x, y) {
  const toolbar = document.getElementById('hl-toolbar');
  // Clamp so toolbar doesn't go off-screen
  const tw = 130; // approx toolbar width
  const clampedX = Math.min(Math.max(x, tw / 2 + 8), window.innerWidth - tw / 2 - 8);
  const clampedY = Math.max(y, 8);
  toolbar.style.left = `${clampedX}px`;
  toolbar.style.top = `${clampedY}px`;
  toolbar.classList.add('visible');
}

function hideToolbar() {
  document.getElementById('hl-toolbar').classList.remove('visible');
}

function applyHighlight() {
  const sel = window.getSelection();
  const range = (_pendingRange && !_pendingRange.collapsed)
    ? _pendingRange
    : (sel && !sel.isCollapsed ? sel.getRangeAt(0) : null);

  if (!range) { hideToolbar(); return; }

  // Use TreeWalker to split across text nodes safely — no broken DOM
  highlightRange(range);

  // Clear selection
  if (sel) sel.removeAllRanges();
  _pendingRange = null;
  hideToolbar();
}

/**
 * Highlight a Range that may span multiple text nodes / block elements.
 * Strategy: collect all text nodes within the range, wrap each one
 * individually in a <mark>. This avoids the surroundContents() constraint
 * that the range must not partially select an element, and keeps
 * inline flow intact so text never breaks unexpectedly.
 */
function highlightRange(range) {
  const passagePane = document.getElementById('passage-pane');

  // Collect all text nodes touched by the range
  const walker = document.createTreeWalker(
    range.commonAncestorContainer.nodeType === Node.TEXT_NODE
      ? range.commonAncestorContainer.parentNode
      : range.commonAncestorContainer,
    NodeFilter.SHOW_TEXT,
    null
  );

  const nodes = [];
  let node;
  while ((node = walker.nextNode())) {
    // Only include nodes inside the passage pane
    if (!passagePane.contains(node)) continue;
    if (!range.intersectsNode(node)) continue;
    nodes.push(node);
  }

  nodes.forEach((textNode) => {
    // Determine which portion of this text node is selected
    let start = 0;
    let end = textNode.length;

    if (textNode === range.startContainer) start = range.startOffset;
    if (textNode === range.endContainer) end = range.endOffset;

    if (start >= end) return; // nothing to highlight here

    // Split and wrap only the selected slice
    // splitText returns the tail; we need to be careful about order
    const before = textNode.splitText(start);       // before = [start..end]
    const after  = before.splitText(end - start);   // after = [end..]  (unused but needed)

    const mark = document.createElement('mark');
    mark.className = 'hl-yellow';
    before.parentNode.insertBefore(mark, before);
    mark.appendChild(before);
    highlights.push(mark);
  });

  // Normalize to clean up any adjacent text nodes we created
  // but only where it's safe (not inside inputs)
  try {
    const ancestor = range.commonAncestorContainer.nodeType === Node.TEXT_NODE
      ? range.commonAncestorContainer.parentNode
      : range.commonAncestorContainer;
    ancestor.normalize && ancestor.normalize();
  } catch(e) { /* ignore */ }
}

function removeHighlight(mark) {
  // Unwrap the mark: move all children before the mark, then remove mark
  const parent = mark.parentNode;
  if (!parent) return;
  while (mark.firstChild) {
    parent.insertBefore(mark.firstChild, mark);
  }
  parent.removeChild(mark);
  parent.normalize();
  // Remove from highlights array
  const idx = highlights.indexOf(mark);
  if (idx > -1) highlights.splice(idx, 1);
}

function clearAllHighlights() {
  // Work on a copy since removeHighlight mutates the array
  [...highlights].forEach(mark => removeHighlight(mark));
  highlights = [];
}

/* ═══════════════════════════════════════════════════════════════
   RESIZABLE SPLITTER
═══════════════════════════════════════════════════════════════ */
function setupSplitter() {
  const splitter = document.getElementById('splitter');
  const passagePane = document.getElementById('passage-pane');
  const splitContainer = document.getElementById('split-container');

  let isDragging = false;
  let startX = 0;
  let startWidth = 0;

  splitter.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX;
    startWidth = passagePane.offsetWidth;
    splitter.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - startX;
    const containerW = splitContainer.offsetWidth;
    const newW = Math.min(Math.max(startWidth + dx, 280), containerW - 280);
    passagePane.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    splitter.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
}

/* ═══════════════════════════════════════════════════════════════

const TIPS_DATA = {

      { title: "Không suy luận", text: "Với NOT GIVEN, học sinh hay tự suy luận từ kiến thức bên ngoài. <strong>Chỉ dùng thông tin trong bài</strong>, không dùng kiến thức thực tế." }
    ],

/* ═══════════════════════════════════════════════════════════════
   TIPS PANEL
═══════════════════════════════════════════════════════════════ */
function openTipsPanel(qType) {
  const panel = document.getElementById('tips-panel');
  const title = document.getElementById('tips-panel-title');
  const body  = document.getElementById('tips-panel-body');

  // Find matching tips — try exact match, then partial
  let data = TIPS_DATA[qType];
  if (!data) {
    const key = Object.keys(TIPS_DATA).find(k => qType.toLowerCase().includes(k.toLowerCase().split(' ')[0]));
    data = key ? TIPS_DATA[key] : null;
  }

  if (!data) {
    body.innerHTML = `<div style="color:var(--ink-muted);padding:20px;font-size:13px;">Chưa có tips cho dạng bài này.</div>`;
  } else {
    title.textContent = qType;

    const stepsHtml = data.steps.map((s, i) => `
      <div class="tips-item">
        <div class="tips-item-num">${i + 1}</div>
        <div class="tips-item-text"><strong>${s.title}:</strong> ${s.text}</div>
      </div>`).join('');

    const trapsHtml = data.traps.map(t => `
      <div class="tips-trap">
        <span class="tips-trap-icon">⚠️</span>
        <span>${t}</span>
      </div>`).join('');

    const bandHtml = data.bandTips.map(b => `
      <div class="tips-band">
        <span class="tips-band-icon">🚀</span>
        <span>${b}</span>
      </div>`).join('');

    body.innerHTML = `
      <div class="tips-overview">${data.overview}</div>

      <div class="tips-section">
        <div class="tips-section-title">📋 Quy trình làm bài</div>
        ${stepsHtml}
      </div>

      <div class="tips-section">
        <div class="tips-section-title">⚠️ Bẫy thường gặp</div>
        ${trapsHtml}
      </div>

      <div class="tips-section">
        <div class="tips-section-title">🚀 Tips tăng Band</div>
        ${bandHtml}
      </div>`;
  }

  panel.classList.add('open');
}

function closeTipsPanel() {
  document.getElementById('tips-panel').classList.remove('open');
}

/* ═══════════════════════════════════════════════════════════════
   SIDEBAR NAV SWITCH (Câu hỏi ↔ Báo cáo)
═══════════════════════════════════════════════════════════════ */
function switchSidebarView(view) {
  const isQ = view === 'questions';
  const qView = document.getElementById('sidebar-view-questions');
  const rView = document.getElementById('sidebar-view-report');
  qView.classList.toggle('hidden', !isQ);
  rView.classList.toggle('visible', !isQ);
  document.getElementById('snav-questions').classList.toggle('active', isQ);
  document.getElementById('snav-report').classList.toggle('active', !isQ);
  if (!isQ) buildReport();
}

/* ═══════════════════════════════════════════════════════════════
   REPORT BUILDER
═══════════════════════════════════════════════════════════════ */
// Track student answers: { qId: { studentAnswer, isCorrect } }
const studentAnswers = {};

// Call after each checkAnswer to register
function registerStudentAnswer(qId, studentAnswer, isCorrect) {
  studentAnswers[qId] = { studentAnswer, isCorrect };
}

function buildReport() {
  const hint    = document.getElementById('report-hint');
  const content = document.getElementById('report-content');
  const totalChecked = Object.keys(studentAnswers).length;

  if (totalChecked === 0) {
    hint.style.display = 'flex';
    content.classList.remove('visible');
    return;
  }

  hint.style.display = 'none';
  content.classList.add('visible');

  // Group results by question type
  const byType = {}; // { typeName: { total, wrong, items: [{id, isCorrect}] } }

  for (const group of TEACHER_DATA.questions) {
    const type = group.type;
    if (!byType[type]) byType[type] = { total: 0, wrong: 0, items: [] };
    for (const item of group.items) {
      if (studentAnswers[item.id] !== undefined) {
        byType[type].total++;
        const correct = studentAnswers[item.id].isCorrect;
        if (!correct) byType[type].wrong++;
        byType[type].items.push({ id: item.id, isCorrect: correct });
      }
    }
  }

  // Build weakness list
  const weakTypes = Object.entries(byType)
    .filter(([, v]) => v.total > 0 && v.wrong > 0)
    .sort((a, b) => (b[1].wrong / b[1].total) - (a[1].wrong / a[1].total));

  let html = '';

  // Summary per type
  for (const [type, data] of Object.entries(byType)) {
    if (data.total === 0) continue;
    const correct = data.total - data.wrong;
    const pct = Math.round((correct / data.total) * 100);
    const scoreClass = pct >= 80 ? 'good' : pct >= 50 ? 'mid' : 'bad';
    const shortType = type.split(' ').slice(0, 3).join(' ');

    const qRows = data.items.map(item => {
      const icon = item.isCorrect ? '✅' : '❌';
      const diag = item.isCorrect ? '' : getDiagnosis(item.id);
      return `<div class="report-q-row">
        <span class="rq-num">${item.id}</span>
        <span class="rq-status">${icon}</span>
        <span class="rq-diag">${diag}</span>
      </div>`;
    }).join('');

    html += `<div class="report-group-card">
      <div class="report-group-head">
        <span class="report-group-name">${shortType}</span>
        <span class="report-group-score ${scoreClass}">${correct}/${data.total} · ${pct}%</span>
      </div>
      <div class="report-q-list">${qRows}</div>
    </div>`;
  }

  // Focus areas for student
  if (weakTypes.length > 0) {
    const focusItems = weakTypes.slice(0, 3).map(([type, data]) => {
      const pct = Math.round(((data.total - data.wrong) / data.total) * 100);
      const shortT = type.split(' ').slice(0,3).join(' ');
      return `<div class="report-focus-item">
        <div class="report-focus-dot"></div>
        <div><strong>${shortT}</strong>: ${pct}% chính xác — cần ôn lại quy trình và bẫy thường gặp</div>
      </div>`;
    }).join('');

    html += `<div class="report-summary-box">
      <div class="report-summary-title">🎯 Học sinh cần tập trung</div>
      ${focusItems}
    </div>`;
  } else if (totalChecked > 0) {
    html += `<div class="report-summary-box">
      <div class="report-summary-title">🎉 Kết quả tốt!</div>
      <div class="report-focus-item"><div class="report-focus-dot"></div><div>Học sinh làm tốt tất cả dạng bài đã check.</div></div>
    </div>`;
  }

  content.innerHTML = html;
}

function getDiagnosis(qId) {
  // Find which question type this belongs to
  for (const group of TEACHER_DATA.questions) {
    for (const item of group.items) {
      if (item.id === qId) {
        const type = group.type;
        if (type.includes('TRUE') || type.includes('FALSE')) return 'Nhầm FALSE/NOT GIVEN';
        if (type.includes('Multiple')) return 'Chọn distractor';
        if (type.includes('Short')) return 'Sai từ / vượt giới hạn';
        if (type.includes('Heading')) return 'Nhầm ý chính';
        if (type.includes('Matching')) return 'Locate sai đoạn';
        if (type.includes('Summary')) return 'Sai từ / paraphrase';
        return 'Cần xem lại';
      }
    }
  }
  return '';
}
